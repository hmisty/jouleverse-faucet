# Nginx 配置文件
# 域名：faucet.f7t.cn
# 用途：Jouleverse 水龙头服务

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name faucet.f7t.cn;

    # ACME 挑战（证书续期）
    location /.well-known/acme-challenge/ {
        root /home/dabai/.acme-challenge;
    }

    # 其他 HTTP 请求重定向到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 配置
server {
    listen 443 ssl;
    server_name faucet.f7t.cn;

    # SSL 证书（ZeroSSL）
    ssl_certificate /home/dabai/.acme.sh/faucet.f7t.cn_ecc/fullchain.cer;
    ssl_certificate_key /home/dabai/.acme.sh/faucet.f7t.cn_ecc/faucet.f7t.cn.key;

    # SSL 配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 日志
    access_log /var/log/nginx/faucet-f7t-access.log;
    error_log /var/log/nginx/faucet-f7t-error.log;

    # 前端开发服务器
    location / {
        proxy_pass http://localhost:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # 后端 API
    location /api {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://localhost:5173;
        expires 1y;
        add_header Cache-Control "public, immutable";
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+application/json application/javascript;
}
